<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic ATS Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--panel-border);">
            <div class="logo-area" style="margin: 0; justify-content: flex-start;">
                <div class="logo-icon">▲</div>
                <h1>Agentic ATS</h1>
            </div>
            <div>
                <span style="margin-right: 1rem;" id="welcome-text">Loading...</span>
                <button style="background: rgba(255, 255, 255, 0.1); padding: 0.5rem 1rem;" id="logout-btn">Logout</button>
            </div>
        </header>

        <main>
            <section class="input-section glass-panel">
                <label for="jd-input">Paste Job Description</label>
                <textarea id="jd-input" placeholder="e.g. Looking for a Senior React Developer with 5+ years of experience in frontend technologies. Must know Node.js and AWS..."></textarea>
                <button id="analyze-btn">
                    <span class="btn-text">Find Candidates</span>
                    <span class="loader hidden"></span>
                </button>
            </section>

            <section id="results-section" class="hidden">
                <div class="results-header">
                    <h2>Top Ranked Candidates</h2>
                    <div id="jd-summary" class="jd-summary"></div>
                </div>
                <!-- Candidate Cards Grid -->
                <div id="candidates-grid" class="candidates-grid"></div>
            </section>
        </main>
    </div>

    <!-- Candidate Card Template (hidden) -->
    <template id="candidate-card-template">
        <div class="card glass-panel" style="--animation-order: 0;">
            <div class="card-header">
                <div>
                    <h3 class="candidate-name"></h3>
                    <div class="candidate-email"></div>
                </div>
                <div class="score-circle">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg"
                            d="M18 2.0845
                              a 15.9155 15.9155 0 0 1 0 31.831
                              a 15.9155 15.9155 0 0 1 0 -31.831"
                        />
                        <path class="circle score-path"
                            stroke-dasharray="0, 100"
                            d="M18 2.0845
                              a 15.9155 15.9155 0 0 1 0 31.831
                              a 15.9155 15.9155 0 0 1 0 -31.831"
                        />
                        <text x="18" y="20.35" class="percentage score-text">0%</text>
                    </svg>
                </div>
            </div>
            
            <div class="card-body">
                <div class="skills-section">
                    <h4>Identified Skills</h4>
                    <div class="skills-tags"></div>
                </div>
                <div class="experience-section">
                    <h4>Experience</h4>
                    <span class="exp-badge"></span>
                </div>
                <div class="reason-section">
                    <h4>AI Reasoning</h4>
                    <p class="reason-text"></p>
                </div>
            </div>
        </div>
    </template>

    <script src="hr.js"></script>
</body>
</html>
